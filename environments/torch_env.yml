name: torch_env
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.9
  # --- Core scientific stack ---
  - numpy
  - scipy
  - pandas
  - matplotlib
  - h5py
  - tables          # PyTables for HDF5
  - scikit-image
  - scikit-learn
  # --- Jupyter ---
  - ipykernel
  - ipywidgets
  - jupyterlab
  # --- Utilities ---
  - tqdm
  - pyyaml
  - pip
  - pip:
    # --- PyTorch (CUDA 12.6) ---
    - --extra-index-url https://download.pytorch.org/whl/cu126
    - torch==2.6.0+cu126
    - torchvision==0.21.0+cu126
    - torchaudio==2.6.0+cu126
    # --- TensorFlow (needed by StarDist / CSBDeep) ---
    - tensorflow>=2.16
    - keras
    - tensorboard
    # --- Disk tracking (Notebook 01) ---
    - stardist
    - csbdeep
    - trackpy
    # --- Image processing (Notebook 02 & 03) ---
    - opencv-python
    # --- Misc ---
    - scienceplots
